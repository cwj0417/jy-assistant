name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Setup keychain with self-signed cert (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # Create a clean keychain
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security list-keychains -s build.keychain
          # Generate and import self-signed certificate
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=JY Assistant"
          openssl pkcs12 -export -out cert.p12 -inkey key.pem -in cert.pem -passout pass:actions
          security import cert.p12 -k build.keychain -P actions -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          # Add cert to trusted list so electron-builder accepts it
          sudo security add-trusted-cert -d -r trustRoot -k build.keychain cert.pem
          # Verify identity is available
          echo "Available signing identities:"
          security find-identity -v build.keychain

      - name: Build Electron app (macOS)
        if: matrix.os == 'macos-latest'
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Electron app (Windows)
        if: matrix.os == 'windows-latest'
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
